<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>To-Do List</h1>
    <main>
        <div class="container">
            <div class="quote">All Power is within you, you can do Anything and Everything. -Swami Vivekananda </div>
            <p style="font-size: 1.5rem;" class="guide">Enter a task here:</p>
            <form>
                <input class="inp_user" placeholder="Wake up at 5 am" name="task">
                <button class="btn">Add</button>
            </form>
            <div class="list hide">

             
            </div>
            <button class="reset mask">Delet</button>
        </div>
    </main>
    <script src="to-do.js"></script>
</body>

</html>
